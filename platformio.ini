; PlatformIO Project Configuration File
; Board: M5Stack Tab5 (ESP32-P4)

[env:tab5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4-evboard
framework = arduino

; Strict C++ Compiler Flags (Best Practices Enforcement)
build_flags =
    -Wall
    -Wextra
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM                ; Pillar 2: Unlock PSRAM for LVGL draw buffers
    -D LV_CONF_INCLUDE_SIMPLE        ; Tell LVGL to use our custom include/lv_conf.h
    -I include                       ; Expose the /include/ folder to all compiler paths

; Serial Monitor options
monitor_speed = 115200

; Dependencies
; NOTE: M5Unified has a broken I2S layer on ESP32-P4 (open bug).
; We use M5GFX (display only) directly until M5Unified fixes P4 support.
lib_deps =
    lvgl/lvgl@^8.3.0
    m5stack/M5GFX@^0.2.0
